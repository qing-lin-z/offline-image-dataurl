<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>离线URL图床</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#fff;color:#333;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 16px}
h1{font-size:2.4em;margin-bottom:6px;text-align:center}
h1 span{color:#333}
.sub{color:#999;margin-bottom:24px;font-size:.95em;text-align:center}

/* Quality slider */
.settings{max-width:720px;width:100%;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center}
.settings label{font-size:.85em;color:#666;white-space:nowrap}
.settings input[type=range]{width:160px;accent-color:#059669}
.settings .val{font-size:.82em;color:#059669;font-weight:600;min-width:38px;text-align:center}
.settings select{font-size:.82em;padding:4px 10px;border:1px solid #ccc;border-radius:6px;color:#333;background:#fff;cursor:pointer}
.settings .sep{color:#ddd}

.dropzone{border:2px dashed #ccc;border-radius:20px;padding:64px 32px;text-align:center;cursor:pointer;transition:all .25s;max-width:720px;width:100%;margin-bottom:24px}
.dropzone:hover,.dropzone.drag{border-color:#a78bfa;background:rgba(167,139,250,.04);box-shadow:0 0 40px rgba(167,139,250,.06)}
.dropzone p:first-child{font-size:1.15em;color:#555;margin-bottom:8px}
.dropzone .hint{font-size:.82em;color:#999;margin-top:6px}
input[type=file]{display:none}
#results{max-width:720px;width:100%}
.card{background:#fafafa;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #e5e5e5;animation:fadeIn .3s ease;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.card-header .info{flex:1;min-width:200px}
.card-header .info strong{font-size:.88em;color:#555;word-break:break-all}
.card-header .size-row{font-size:.78em;color:#999;margin-top:2px}
.card-header .size-row .orig{text-decoration:line-through;margin-right:8px}
.card-header .size-row .final{color:#059669;font-weight:600}
.card-header .saved{font-size:.75em;color:#059669;font-weight:600;background:#ecfdf5;padding:2px 8px;border-radius:10px;white-space:nowrap}
.card-header .badge{font-size:.7em;padding:3px 10px;border-radius:20px;font-weight:600;background:#ecfdf5;color:#059669;white-space:nowrap;border:1px solid #a7f3d0}
.url-box{background:#f0fdf4;padding:14px 16px;border-radius:10px;font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:.72em;word-break:break-all;color:#059669;margin:8px 0;cursor:pointer;border:1px solid #bbf7d0;transition:border .2s;position:relative;line-height:1.6}
.url-box:hover{border-color:#059669}
.url-box::after{content:'📋 点击复制';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:.7em;color:#999;font-family:system-ui;pointer-events:none;background:linear-gradient(90deg,transparent 0,#f0fdf4 30%);padding-left:24px}
.url-box.copied::after{content:'✅ 已复制';color:#059669}
.card img{max-width:100%;max-height:400px;border-radius:10px;margin-top:8px;display:block;object-fit:contain}
#status{color:#999;font-size:.85em;margin-top:8px;min-height:22px;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
footer{margin-top:40px;color:#bbb;font-size:.75em;text-align:center}
footer code{color:#999;font-size:.85em}
.counter{color:#999;font-size:.8em;margin-bottom:8px;text-align:center}
</style>
</head>
<body>
<h1><span>离线URL图床</span></h1>
<p class="sub">图片编码进 data: URL &mdash; 纯前端，零依赖，极致压缩</p>

<div class="settings">
  <label for="fmt">输出格式</label>
  <select id="fmt">
    <option value="auto">自动（保持原格式）</option>
    <option value="jpeg">JPEG（最小）</option>
    <option value="png">PNG（无损）</option>
    <option value="webp">WebP（推荐）</option>
  </select>
  <span class="sep">|</span>
  <label for="quality">品质</label>
  <input type="range" id="quality" min="10" max="100" value="75" step="5">
  <span class="val" id="qVal">75%</span>
  <span class="sep">|</span>
  <label for="maxSize">最大边长</label>
  <select id="maxSize">
    <option value="0">不限制</option>
    <option value="1920">1920px</option>
    <option value="1280">1280px</option>
    <option value="800">800px</option>
    <option value="400">400px（极短）</option>
  </select>
</div>

<p class="counter" id="counter" style="display:none"></p>

<div class="dropzone" id="zone">
  <p>📁 拖拽图片到这里</p>
  <p class="hint">或点击选择 · Ctrl+V 粘贴截图 · PNG / JPEG / GIF / WebP / SVG / BMP</p>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div id="results"></div>
<div id="status"></div>

<footer>
  格式 <code>data:image/格式;base64,...</code> &mdash; 品质越低、边长越小，URL 越短
</footer>

<script>
(function(){
var zone = document.getElementById('zone');
var fileInput = document.getElementById('fileInput');
var results = document.getElementById('results');
var statusEl = document.getElementById('status');
var counterEl = document.getElementById('counter');
var qSlider = document.getElementById('quality');
var qVal = document.getElementById('qVal');
var fmtSelect = document.getElementById('fmt');
var maxSelect = document.getElementById('maxSize');
var totalCount = 0, totalOrig = 0, totalFinal = 0;

qSlider.addEventListener('input', function(){ qVal.textContent = qSlider.value + '%'; });

zone.addEventListener('click', function(){ fileInput.click(); });
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function(){ handleFiles(fileInput.files); });

function handleFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (f.type.indexOf('image/') !== 0) continue;
    compressAndEncode(f);
  }
}

function compressAndEncode(file) {
  _status('⏳ 压缩编码: ' + file.name + ' (' + _size(file.size) + ')');
  var reader = new FileReader();
  reader.onload = function() {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var maxW = parseInt(maxSelect.value) || 0;
      var w = img.width, h = img.height;

      // Resize if needed
      if (maxW > 0 && (w > maxW || h > maxW)) {
        var ratio = maxW / Math.max(w, h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }

      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      // Determine output format
      var outFmt = fmtSelect.value;
      var origFmt = (file.type.match(/image\/(\w+)/) || [])[1] || 'png';
      if (origFmt === 'jpeg') origFmt = 'jpg';
      if (outFmt === 'auto') outFmt = origFmt;

      var mime;
      if (outFmt === 'jpg' || outFmt === 'jpeg') mime = 'image/jpeg';
      else if (outFmt === 'webp') mime = 'image/webp';
      else mime = 'image/png';

      var quality = parseInt(qSlider.value) / 100;
      var dataUrl = canvas.toDataURL(mime, quality);
      var compressedSize = Math.round(dataUrl.length * 0.75); // base64 → binary approx

      addCard(file.name, file.size, compressedSize, dataUrl);
      totalCount++;
      totalOrig += file.size;
      totalFinal += compressedSize;
      updateCounter();
      _status('✓ 完成');
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function addCard(name, origSize, finalSize, dataUrl) {
  var saved = origSize > 0 ? Math.round((1 - finalSize / origSize) * 100) : 0;
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="card-header">' +
      '<div class="info">' +
        '<strong>' + _esc(name) + '</strong>' +
        '<div class="size-row">' +
          '<span class="orig">' + _size(origSize) + '</span>' +
          '<span class="final">' + _size(finalSize) + '</span>' +
          (saved > 0 ? '<span class="saved">-' + saved + '%</span>' : '') +
        '</div>' +
      '</div>' +
      '<span class="badge">⚡ 离线</span>' +
    '</div>' +
    '<div class="url-box" data-url="' + _esc(dataUrl) + '" onclick="copyUrl(this)" title="点击复制">' +
      _esc(truncate(dataUrl, 140)) +
    '</div>' +
    '<img src="' + _esc(dataUrl) + '" alt="' + _esc(name) + '" loading="lazy" onerror="this.style.display=\'none\'">';
  results.prepend(card);
}

function truncate(str, max) {
  if (str.length <= max) return str;
  var half = Math.floor((max - 3) / 2);
  return str.slice(0, half) + '...' + str.slice(str.length - half);
}

function copyUrl(el) {
  navigator.clipboard.writeText(el.dataset.url).then(function(){
    el.classList.add('copied');
    setTimeout(function(){ el.classList.remove('copied'); }, 2000);
  });
}

function updateCounter() {
  counterEl.style.display = 'block';
  var saved = totalOrig > 0 ? Math.round((1 - totalFinal / totalOrig) * 100) : 0;
  counterEl.textContent = '已编码 ' + totalCount + ' 张 · ' + _size(totalOrig) + ' → ' + _size(totalFinal) + (saved > 0 ? ' (省 ' + saved + '%)' : '');
}

function _size(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}

function _status(s) { statusEl.textContent = s; }

function _esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

window.copyUrl = copyUrl;

document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  var imgs = [];
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image/') === 0) imgs.push(items[i].getAsFile());
  }
  if (imgs.length) { e.preventDefault(); handleFiles(imgs); }
});

})();
</script>
</body>
</html>
