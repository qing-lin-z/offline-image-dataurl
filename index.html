<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>离线URL图床</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#fff;color:#333;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 16px}
h1{font-size:2.4em;margin-bottom:6px;text-align:center}
h1 span{color:#333}
.sub{color:#999;margin-bottom:36px;font-size:.95em;text-align:center}
.dropzone{border:2px dashed #ccc;border-radius:20px;padding:64px 32px;text-align:center;cursor:pointer;transition:all .25s;max-width:720px;width:100%;margin-bottom:24px}
.dropzone:hover,.dropzone.drag{border-color:#a78bfa;background:rgba(167,139,250,.04);box-shadow:0 0 40px rgba(167,139,250,.06)}
.dropzone p:first-child{font-size:1.15em;color:#555;margin-bottom:8px}
.dropzone .hint{font-size:.82em;color:#999;margin-top:6px}
input[type=file]{display:none}
#results{max-width:720px;width:100%}
.card{background:#fafafa;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #e5e5e5;animation:fadeIn .3s ease;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.card-header .info{flex:1;min-width:200px}
.card-header .info strong{font-size:.88em;color:#555;word-break:break-all}
.card-header .info .size{font-size:.78em;color:#999;margin-left:8px}
.card-header .badge{font-size:.7em;padding:3px 10px;border-radius:20px;font-weight:600;background:#ecfdf5;color:#059669;white-space:nowrap;border:1px solid #a7f3d0}
.url-box{background:#f0fdf4;padding:14px 16px;border-radius:10px;font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:.72em;word-break:break-all;color:#059669;margin:8px 0;cursor:pointer;border:1px solid #bbf7d0;transition:border .2s;position:relative;line-height:1.6}
.url-box:hover{border-color:#4ade80}
.url-box::after{content:'📋 点击复制';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:.7em;color:#999;font-family:system-ui;pointer-events:none;background:linear-gradient(90deg,transparent 0,#f0fdf4 30%);padding-left:24px}
.url-box.copied::after{content:'✅ 已复制';color:#4ade80}
.card img{max-width:100%;max-height:400px;border-radius:10px;margin-top:8px;display:block;object-fit:contain}
#status{color:#999;font-size:.85em;margin-top:8px;min-height:22px;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
footer{margin-top:40px;color:#bbb;font-size:.75em;text-align:center}
footer code{color:#999;font-size:.85em}
.counter{color:#999;font-size:.8em;margin-bottom:8px;text-align:center}
</style>
</head>
<body>
<h1><span>离线URL图床</span></h1>
<p class="sub">图片编码进 data: URL &mdash; 纯前端，零依赖，粘贴即显示</p>
<p class="counter" id="counter" style="display:none"></p>

<div class="dropzone" id="zone">
  <p>📁 拖拽图片到这里</p>
  <p class="hint">或点击选择 · Ctrl+V 粘贴截图 · PNG / JPEG / GIF / WebP / SVG / BMP</p>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div id="results"></div>
<div id="status"></div>

<footer>
  格式 <code>data:image/格式;base64,...</code> &mdash; 粘贴到浏览器地址栏即可显示
</footer>

<script>
(function(){
var zone = document.getElementById('zone');
var fileInput = document.getElementById('fileInput');
var results = document.getElementById('results');
var statusEl = document.getElementById('status');
var counterEl = document.getElementById('counter');
var totalCount = 0, totalSize = 0;

zone.addEventListener('click', function(){ fileInput.click(); });
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function(){ handleFiles(fileInput.files); });

function handleFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (f.type.indexOf('image/') !== 0) continue;
    encodeFile(f);
  }
}

function encodeFile(file) {
  _status('⏳ 编码: ' + file.name + ' (' + _size(file.size) + ')');
  var reader = new FileReader();
  reader.onload = function() {
    var dataUrl = reader.result;
    var size = file.size;
    addCard(file.name, size, dataUrl);
    totalCount++;
    totalSize += size;
    updateCounter();
    _status('✓ 完成');
  };
  reader.readAsDataURL(file);
}

function addCard(name, size, dataUrl) {
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="card-header">' +
      '<div class="info">' +
        '<strong>' + _esc(name) + '</strong>' +
        '<span class="size">' + _size(size) + '</span>' +
      '</div>' +
      '<span class="badge">⚡ 离线</span>' +
    '</div>' +
    '<div class="url-box" data-url="' + _esc(dataUrl) + '" onclick="copyUrl(this)" title="点击复制 data URL">' +
      _esc(truncate(dataUrl, 140)) +
    '</div>' +
    '<img src="' + _esc(dataUrl) + '" alt="' + _esc(name) + '" loading="lazy" onerror="this.style.display=\'none\'">';
  results.prepend(card);
}

function truncate(str, max) {
  if (str.length <= max) return str;
  var half = Math.floor((max - 3) / 2);
  return str.slice(0, half) + '...' + str.slice(str.length - half);
}

function copyUrl(el) {
  navigator.clipboard.writeText(el.dataset.url).then(function(){
    el.classList.add('copied');
    setTimeout(function(){ el.classList.remove('copied'); }, 2000);
  });
}

function updateCounter() {
  counterEl.style.display = 'block';
  counterEl.textContent = '已编码 ' + totalCount + ' 张 · 共 ' + _size(totalSize);
}

function _size(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}

function _status(s) { statusEl.textContent = s; }

function _esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

window.copyUrl = copyUrl;

document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  var imgs = [];
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image/') === 0) imgs.push(items[i].getAsFile());
  }
  if (imgs.length) { e.preventDefault(); handleFiles(imgs); }
});

})();
</script>
</body>
</html>
